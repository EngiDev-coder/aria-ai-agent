<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — Voice Receptionist</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060a; --surface: #0e0e16; --border: #1a1a2a;
    --gold: #c9a96e; --gold2: #e8d5a3; --blue: #6b9fd4;
    --text: #ede9e1; --muted: #5a5770;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text); font-family:'DM Mono',monospace;
    height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; overflow:hidden; position:relative;
  }
  .ambient { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .ambient::before {
    content:''; position:absolute; top:10%; left:20%; width:500px; height:500px;
    background:radial-gradient(ellipse,rgba(201,169,110,0.06) 0%,transparent 65%);
    animation:drift1 12s ease-in-out infinite alternate;
  }
  .ambient::after {
    content:''; position:absolute; bottom:5%; right:10%; width:400px; height:400px;
    background:radial-gradient(ellipse,rgba(107,159,212,0.05) 0%,transparent 65%);
    animation:drift2 15s ease-in-out infinite alternate;
  }
  @keyframes drift1 { to { transform:translate(30px,-20px); } }
  @keyframes drift2 { to { transform:translate(-20px,20px); } }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
    pointer-events:none; z-index:100;
  }
  .stage {
    position:relative; z-index:10; display:flex; flex-direction:column;
    align-items:center; width:100%; max-width:520px; padding:40px 24px;
  }
  .header { text-align:center; margin-bottom:48px; }
  .brand {
    font-family:'Cormorant Garamond',serif; font-size:48px; font-weight:300;
    letter-spacing:0.3em; color:var(--gold); line-height:1;
    text-shadow:0 0 40px rgba(201,169,110,0.3);
  }
  .brand-sub { font-size:9px; letter-spacing:0.5em; color:var(--muted); text-transform:uppercase; margin-top:8px; display:block; }
  
  .orb-stage { position:relative; width:220px; height:220px; display:flex; align-items:center; justify-content:center; margin-bottom:40px; }
  .orb-core {
    width:90px; height:90px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%,rgba(232,213,163,0.9),rgba(201,169,110,0.6),rgba(100,80,40,0.8));
    box-shadow:0 0 30px rgba(201,169,110,0.25);
    transition:all 0.4s ease; cursor:pointer;
  }
  .orb-core.listening { background:radial-gradient(circle at 35% 35%,rgba(163,200,232,0.9),rgba(107,159,212,0.6)); animation:pulse 1.2s infinite; }
  .orb-core.thinking { opacity: 0.7; animation:pulse 0.8s infinite alternate; }
  @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

  .status-area { text-align:center; min-height:80px; margin-bottom:36px; }
  .transcript { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:17px; color:rgba(237,233,225,0.7); }
  
  .mic-btn { 
    width:72px; height:72px; border-radius:50%; border:2px solid rgba(201,169,110,0.3); 
    background:rgba(14,14,22,0.8); cursor:pointer; display:flex; align-items:center; justify-content:center; 
  }
  .mic-btn svg { width:26px; height:26px; fill:var(--gold); }
  .mic-btn.active { border-color:var(--blue); }
</style>
</head>
<body>

<div class="ambient"></div>

<div class="stage">
  <div class="header">
    <div class="brand">ARIA</div>
    <span class="brand-sub">Voice Receptionist</span>
  </div>

  <div class="orb-stage">
    <div class="orb-core" id="orb"></div>
  </div>

  <div class="status-area">
    <div class="transcript" id="transcript">Ready to assist you.</div>
  </div>

  <button class="mic-btn" id="micBtn" onclick="toggleListen()">
    <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2H3v2a9 9 0 0 0 8 8.94V23h2v-2.06A9 9 0 0 0 21 12v-2h-2z"/></svg>
  </button>
</div>

<script>
const API_URL = "/api/chat";
let recognition = null, isListening = false, isSpeaking = false;

const orb = document.getElementById('orb');
const transcript = document.getElementById('transcript');
const micBtn = document.getElementById('micBtn');

function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return alert("Web Speech API not supported in this browser.");
  
  recognition = new SR();
  recognition.continuous = false;
  recognition.lang = 'en-US';

  recognition.onstart = () => { isListening = true; setMode('listening'); };
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    handleUserSpeech(text);
  };
  recognition.onend = () => { isListening = false; if(!isSpeaking) setMode('idle'); };
}

function setMode(mode) {
  orb.className = 'orb-core';
  micBtn.classList.remove('active');
  if (mode === 'listening') { orb.classList.add('listening'); micBtn.classList.add('active'); }
  else if (mode === 'thinking') { orb.classList.add('thinking'); }
  else if (mode === 'speaking') { orb.classList.add('speaking'); }
}

function toggleListen() {
  if (isSpeaking) { window.speechSynthesis.cancel(); isSpeaking = false; setMode('idle'); return; }
  if (!recognition) initRecognition();
  isListening ? recognition.stop() : recognition.start();
}

async function handleUserSpeech(userText) {
  transcript.textContent = userText;
  setMode('thinking');

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userMessage: userText })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    speakText(data.reply);
  } catch(err) {
    console.error(err);
    transcript.textContent = "Connection error.";
    setMode('idle');
  }
}

function speakText(text) {
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.onstart = () => { isSpeaking = true; setMode('speaking'); transcript.textContent = text; };
  utter.onend = () => { isSpeaking = false; setMode('idle'); };
  window.speechSynthesis.speak(utter);
}
</script>
</body>
</html>
